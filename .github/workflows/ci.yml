name: CI

# cat-identity Tier 1 fix R4-4 m10 — PR 머지 전 빌드/타입/테스트 강제.
#
# 본 workflow 는 다음을 검증:
#   1) tsc --noEmit (TypeScript 타입 체크)
#   2) vitest run (단위 테스트 — cat-identity 포함)
#   3) verify:routes (라우트 manifest 무결성)
#   4) next build (production 빌드 가능)
#
# 환경변수 NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY 는
# CI 빌드 통과만을 위한 placeholder (Vercel production env 와 무관).
#
# 운영 정책 (CLAUDE.md):
#   - PR 머지 전 본 workflow green 필수.
#   - cat-identity 영역 회귀 0건 자동 검증 (R4-1 ~ R4-5 신규 테스트 포함).

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Verify lockfile (R5-3 R8-2 — npm 단독 강제)
        # package.json packageManager: "npm@11.9.0" 와 정합성 보장.
        # pnpm-lock.yaml / yarn.lock 가 실수로 commit 되면 CI silent drift → 즉시 fail.
        run: |
          if [ ! -f package-lock.json ]; then
            echo "ERROR: package-lock.json 부재 — npm 기반 CI 인데 lockfile 없음"
            exit 1
          fi
          if [ -f pnpm-lock.yaml ]; then
            echo "ERROR: pnpm-lock.yaml 발견 — 본 프로젝트는 npm 단독 (package.json packageManager: npm)"
            exit 1
          fi
          if [ -f yarn.lock ]; then
            echo "ERROR: yarn.lock 발견 — 본 프로젝트는 npm 단독"
            exit 1
          fi
          echo "OK: package-lock.json 단독 확인"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Vitest run
        run: npx vitest run
      - name: Next build
        # verify:routes 는 .next/routes-manifest.json 을 읽으므로 build 후 실행.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
        run: npx next build
      - name: Verify routes manifest
        run: npm run verify:routes
